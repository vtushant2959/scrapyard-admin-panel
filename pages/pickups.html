<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickups | Scrapyard Admin</title>
  <link rel="icon" href="../assets/logo/favicon.ico" />
  <link rel="stylesheet" href="../css/global.css" />
  <style>
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .mini-stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 18px 20px; }
    .mini-stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .mini-stat-val   { font-size: 26px; font-weight: 700; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pickup-list { display: flex; flex-direction: column; gap: 14px; }
    .pickup-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; }
    .pickup-row  { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .pickup-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .pickup-addr { font-size: 13px; color: var(--text-muted); }
    .pickup-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
    .status-select { padding: 8px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="page-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header">
        <h1>Pickup Requests</h1>
        <span class="text-muted" id="pickup-count"></span>
      </div>
      <div class="stats-row">
        <div class="mini-stat"><div class="mini-stat-label">Total</div><div class="mini-stat-val" id="st-total">—</div></div>
        <div class="mini-stat"><div class="mini-stat-label">Pending</div><div class="mini-stat-val" style="color:var(--warning)" id="st-pending">—</div></div>
        <div class="mini-stat"><div class="mini-stat-label">Active</div><div class="mini-stat-val" style="color:var(--info)" id="st-active">—</div></div>
        <div class="mini-stat"><div class="mini-stat-label">Done</div><div class="mini-stat-val" style="color:var(--success)" id="st-done">—</div></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" data-status="all">All</button>
        <button class="filter-btn" data-status="Pending">Pending</button>
        <button class="filter-btn" data-status="Active">Active</button>
        <button class="filter-btn" data-status="Done">Done</button>
      </div>
      <div id="pickup-list" class="pickup-list"></div>
    </main>
  </div>

  <script type="module" src="../js/middleware/auth-guard.js"></script>
  <script type="module" src="../js/main.js"></script>
  <script type="module">
    import { db } from "../js/firebase/firebase-config.js";
    import { collection, getDocs, updateDoc, doc, query, orderBy }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import toast from "../js/components/toast.js";
    import loader from "../js/components/loader.js";
    import { formatDate } from "../js/utils/date-format.js";

    let allPickups = [], activeFilter = "all";

    async function load() {
      try {
        loader.show();
        const snap = await getDocs(query(collection(db, "scrap_requests"), orderBy("createdAt","desc")))
          .catch(() => getDocs(collection(db, "scrap_requests")));
        allPickups = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        const total   = allPickups.length;
        const pending = allPickups.filter(p => p.status === "Pending" || !p.status).length;
        const active  = allPickups.filter(p => p.status === "Active").length;
        const done    = allPickups.filter(p => p.status === "Done").length;

        document.getElementById("pickup-count").textContent = `${total} total`;
        document.getElementById("st-total").textContent   = total;
        document.getElementById("st-pending").textContent = pending;
        document.getElementById("st-active").textContent  = active;
        document.getElementById("st-done").textContent    = done;
        render();
      } catch(e) { toast.show(e.message, "error"); }
      finally { loader.hide(); }
    }

    function render() {
      let list = allPickups;
      if (activeFilter !== "all") {
        if (activeFilter === "Pending") list = list.filter(p => p.status === "Pending" || !p.status);
        else list = list.filter(p => p.status === activeFilter);
      }
      const container = document.getElementById("pickup-list");
      container.innerHTML = "";
      if (!list.length) {
        container.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:40px">No pickups found.</p>`;
        return;
      }
      list.forEach(p => {
        const card = document.createElement("div"); card.className = "pickup-card";
        const row  = document.createElement("div"); row.className = "pickup-row";

        const left = document.createElement("div");
        const nm   = document.createElement("div"); nm.className = "pickup-name"; nm.textContent = p.customerName || "—";
        const addr = document.createElement("div"); addr.className = "pickup-addr"; addr.textContent = p.address || "—";
        const date = document.createElement("div"); date.className = "pickup-addr mt-1"; date.textContent = formatDate(p.createdAt);
        left.appendChild(nm); left.appendChild(addr); left.appendChild(date);

        const badge = document.createElement("span");
        badge.className = `badge badge-${pickupBadge(p.status)}`;
        badge.textContent = p.status || "Pending";

        row.appendChild(left); row.appendChild(badge);

        const actions = document.createElement("div"); actions.className = "pickup-actions";
        const sel = document.createElement("select"); sel.className = "status-select";
        ["Pending","Active","Done"].forEach(s => {
          const opt = document.createElement("option");
          opt.value = s; opt.textContent = s;
          if ((p.status || "Pending") === s) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.onchange = async () => {
          try {
            loader.show();
            await updateDoc(doc(db, "scrap_requests", p.id), { status: sel.value });
            p.status = sel.value;
            badge.className = `badge badge-${pickupBadge(sel.value)}`;
            badge.textContent = sel.value;
            toast.show("Status updated");
          } catch(e) { toast.show(e.message, "error"); }
          finally { loader.hide(); }
        };
        actions.appendChild(sel);

        card.appendChild(row); card.appendChild(actions);
        container.appendChild(card);
      });
    }

    function pickupBadge(s) {
      if (!s || s === "Pending") return "warning";
      if (s === "Done")          return "success";
      return "info";
    }

    document.querySelectorAll(".filter-btn").forEach(btn =>
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeFilter = btn.dataset.status;
        render();
      })
    );

    load();
  </script>
</body>
</html>
