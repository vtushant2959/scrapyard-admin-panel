<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Scrapyard Admin</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="./assets/logo/favicon.ico" />
  <link rel="stylesheet" href="./css/global.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ---- Stat Cards ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: var(--transition);
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .stat-icon {
      width: 52px; height: 52px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .stat-icon.blue   { background: rgba(59,130,246,.15); }
    .stat-icon.green  { background: rgba(34,197,94,.15);  }
    .stat-icon.yellow { background: rgba(245,158,11,.15); }
    .stat-icon.red    { background: rgba(239,68,68,.15);  }
    .stat-icon.cyan   { background: rgba(6,182,212,.15);  }
    .stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-sub   { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ---- Dashboard grid ---- */
    .dash-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .dash-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .dash-card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text-primary);
    }
    .chart-wrap { position: relative; height: 280px; }

    /* ---- Recent table ---- */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 13px 14px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg-card-hover); }

    /* ---- Quick actions ---- */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .quick-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 18px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }
    .quick-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .quick-btn span { font-size: 22px; }

    /* ---- Responsive ---- */
    @media (max-width: 900px) {
      .dash-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .stat-value { font-size: 22px; }
    }
    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="sidebar-container"></div>

  <div class="page-wrapper">

    <div id="navbar"></div>

    <main class="main-content">

      <div class="page-header">
        <h1>Dashboard</h1>
        <span class="text-muted" id="dashDate"></span>
      </div>

      <!-- Stat Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div>
            <div class="stat-label">Total Users</div>
            <div class="stat-value" id="total-users">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">📦</div>
          <div>
            <div class="stat-label">Total Orders</div>
            <div class="stat-value" id="total-orders">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon yellow">🛒</div>
          <div>
            <div class="stat-label">Products</div>
            <div class="stat-value" id="total-products">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon cyan">🚚</div>
          <div>
            <div class="stat-label">Scrap Pickups</div>
            <div class="stat-value" id="total-scrap-requests">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red">⭐</div>
          <div>
            <div class="stat-label">Reviews</div>
            <div class="stat-value" id="total-reviews">—</div>
          </div>
        </div>
      </div>

      <!-- Charts + Quick Actions -->
      <div class="dash-grid">

        <div class="dash-card">
          <div class="dash-card-title">Overview</div>
          <div class="chart-wrap">
            <canvas id="overviewChart"></canvas>
          </div>
        </div>

        <div class="dash-card">
          <div class="dash-card-title">Quick Actions</div>
          <div class="quick-actions">
            <a href="/pages/users.html"         class="quick-btn"><span>👥</span>Users</a>
            <a href="/pages/orders.html"        class="quick-btn"><span>📦</span>Orders</a>
            <a href="/pages/pickups.html"       class="quick-btn"><span>🚚</span>Pickups</a>
            <a href="/pages/payments.html"      class="quick-btn"><span>💳</span>Payments</a>
            <a href="/pages/reviews.html"       class="quick-btn"><span>⭐</span>Reviews</a>
            <a href="/pages/notifications.html" class="quick-btn"><span>🔔</span>Notify</a>
          </div>
        </div>

      </div>

      <!-- Recent Orders -->
      <div class="dash-card" style="margin-bottom:20px;">
        <div class="dash-card-title">Recent Orders</div>
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recent-orders-body">
              <tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text-muted);">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Recent Users + Pickup Stats -->
      <div class="dash-grid">
        <div class="dash-card">
          <div class="dash-card-title">Recent Users</div>
          <table class="data-table">
            <thead>
              <tr><th>Name</th><th>Email</th><th>Status</th></tr>
            </thead>
            <tbody id="recent-users-body">
              <tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text-muted);">Loading…</td></tr>
            </tbody>
          </table>
        </div>

        <div class="dash-card">
          <div class="dash-card-title">Pickup Status Split</div>
          <div class="chart-wrap" style="height:220px;">
            <canvas id="pickupChart"></canvas>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script type="module" src="./js/middleware/auth-guard.js"></script>
  <script type="module" src="./js/main.js"></script>

  <script type="module">
    import { db } from "./js/firebase/firebase-config.js";
    import {
      collection, getDocs, query, orderBy, limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { formatDate } from "./js/utils/date-format.js";

    /* Date */
    document.getElementById("dashDate").textContent =
      new Date().toLocaleDateString("en-IN", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

    async function count(col) {
      const snap = await getDocs(collection(db, col));
      return snap.size;
    }

    async function loadDashboard() {
      try {
        /* Stat counts */
        const [users, orders, products, pickups, reviews] = await Promise.all([
          count("users"), count("orders"), count("products"),
          count("scrap_requests"), count("reviews")
        ]);

        document.getElementById("total-users").textContent           = users;
        document.getElementById("total-orders").textContent          = orders;
        document.getElementById("total-products").textContent        = products;
        document.getElementById("total-scrap-requests").textContent  = pickups;
        document.getElementById("total-reviews").textContent         = reviews;

        /* Overview bar chart */
        new Chart(document.getElementById("overviewChart"), {
          type: "bar",
          data: {
            labels: ["Users","Orders","Products","Pickups","Reviews"],
            datasets: [{
              label: "Count",
              data: [users, orders, products, pickups, reviews],
              backgroundColor: [
                "rgba(59,130,246,.7)","rgba(34,197,94,.7)",
                "rgba(245,158,11,.7)","rgba(6,182,212,.7)","rgba(239,68,68,.7)"
              ],
              borderRadius: 8,
              borderSkipped: false
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { color: "rgba(255,255,255,.05)" }, ticks: { color: "#94a3b8" } },
              y: { beginAtZero: true, grid: { color: "rgba(255,255,255,.05)" }, ticks: { color: "#94a3b8" } }
            }
          }
        });

        /* Recent orders */
        const ordersSnap = await getDocs(
          query(collection(db, "orders"), orderBy("createdAt","desc"), limit(6))
        ).catch(() => getDocs(query(collection(db, "orders"), limit(6))));

        const ordBody = document.getElementById("recent-orders-body");
        ordBody.innerHTML = "";
        if (ordersSnap.empty) {
          ordBody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text-muted);">No orders yet</td></tr>`;
        } else {
          ordersSnap.forEach(d => {
            const o = d.data();
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${d.id.slice(0,8).toUpperCase()}</td>
              <td><span class="badge badge-${statusBadge(o.status)}">${o.status || "Pending"}</span></td>
              <td>${formatDate(o.createdAt)}</td>
            `;
            ordBody.appendChild(tr);
          });
        }

        /* Recent users */
        const usersSnap = await getDocs(
          query(collection(db, "users"), orderBy("createdAt","desc"), limit(5))
        ).catch(() => getDocs(query(collection(db, "users"), limit(5))));

        const usrBody = document.getElementById("recent-users-body");
        usrBody.innerHTML = "";
        if (usersSnap.empty) {
          usrBody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text-muted);">No users yet</td></tr>`;
        } else {
          usersSnap.forEach(d => {
            const u = d.data();
            const tr = document.createElement("tr");
            const nameEl = document.createElement("td");
            nameEl.textContent = u.name || "—";
            const emailEl = document.createElement("td");
            emailEl.textContent = u.email || "—";
            const statusEl = document.createElement("td");
            statusEl.innerHTML = `<span class="badge badge-${u.status === "blocked" ? "danger" : "success"}">${u.status || "active"}</span>`;
            tr.appendChild(nameEl);
            tr.appendChild(emailEl);
            tr.appendChild(statusEl);
            usrBody.appendChild(tr);
          });
        }

        /* Pickup doughnut */
        const pickSnap = await getDocs(collection(db, "scrap_requests"));
        let pending = 0, active = 0, done = 0;
        pickSnap.forEach(d => {
          const s = d.data().status;
          if (s === "Done") done++;
          else if (s === "Active") active++;
          else pending++;
        });
        new Chart(document.getElementById("pickupChart"), {
          type: "doughnut",
          data: {
            labels: ["Pending","Active","Done"],
            datasets: [{ data: [pending, active, done],
              backgroundColor: ["rgba(245,158,11,.8)","rgba(6,182,212,.8)","rgba(34,197,94,.8)"],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { position: "bottom", labels: { color: "#94a3b8", padding: 16, font: { size: 13 } } }
            }
          }
        });

      } catch (err) {
        console.error("Dashboard load error:", err);
      }
    }

    function statusBadge(s) {
      if (!s || s === "Pending")   return "warning";
      if (s === "Completed")        return "success";
      if (s === "Cancelled")        return "danger";
      return "info";
    }

    loadDashboard();
  </script>

</body>
</html>
