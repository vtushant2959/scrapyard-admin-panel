<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | Scrapyard Admin</title>
  <link rel="icon" href="../assets/logo/favicon.ico" />
  <link rel="stylesheet" href="../css/global.css" />
  <style>
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
    .toolbar input { flex: 1; min-width: 200px; max-width: 360px; padding: 11px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text-primary); font-size: 14px; }
    .toolbar input::placeholder { color: var(--text-muted); }

    /* Add-product panel */
    .add-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; display: none; }
    .add-panel.open { display: block; }
    .add-panel h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }
    .add-panel .form-actions { display: flex; gap: 10px; margin-top: 18px; }

    /* Grid */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 18px; }
    .product-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition); }
    .product-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .product-img { width: 100%; height: 160px; object-fit: cover; background: var(--bg-input); }
    .product-body { padding: 16px; }
    .product-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .product-cat  { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .product-price { font-size: 18px; font-weight: 700; color: var(--success); }
    .product-actions { display: flex; gap: 8px; margin-top: 14px; }
    .product-actions button { flex: 1; padding: 9px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: var(--transition); }
    .progress-bar { height: 4px; background: var(--bg-input); border-radius: 4px; margin-top: 8px; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .3s ease; }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="page-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header">
        <h1>Products</h1>
        <button class="btn btn-primary" id="toggleAddBtn">+ Add Product</button>
      </div>

      <!-- Add Product Panel -->
      <div class="add-panel" id="addPanel">
        <h2>New Product</h2>
        <form id="add-product-form">
          <div class="form-row">
            <div class="form-group">
              <label>Product Name</label>
              <input class="form-control" type="text" id="product-name" placeholder="e.g. Iron Scrap" required />
            </div>
            <div class="form-group">
              <label>Category</label>
              <input class="form-control" type="text" id="product-category" placeholder="e.g. Metal" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Price (₹ per kg)</label>
              <input class="form-control" type="number" id="product-price" placeholder="0" min="0" required />
            </div>
            <div class="form-group">
              <label>Product Image</label>
              <input class="form-control" type="file" id="product-image" accept="image/jpeg,image/png,image/webp" required />
            </div>
          </div>
          <div class="progress-bar" id="upload-progress-bar">
            <div class="progress-fill" id="upload-progress-fill"></div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Save Product</button>
            <button class="btn" type="button" id="cancelAddBtn" style="background:var(--bg-input);color:var(--text-secondary);">Cancel</button>
          </div>
        </form>
      </div>

      <div class="toolbar">
        <input type="search" id="product-search" placeholder="Search products…" />
        <span class="text-muted" id="products-count"></span>
      </div>
      <div id="products-list" class="products-grid"></div>
    </main>
  </div>

  <script type="module" src="../js/middleware/auth-guard.js"></script>
  <script type="module" src="../js/main.js"></script>
  <script type="module">
    import { db } from "../js/firebase/firebase-config.js";
    import { collection, getDocs, addDoc, deleteDoc, doc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import storageService from "../js/firebase/storage.js";
    import toast from "../js/components/toast.js";
    import loader from "../js/components/loader.js";

    let allProducts = [];

    /* Toggle add panel */
    document.getElementById("toggleAddBtn").onclick = () => {
      document.getElementById("addPanel").classList.toggle("open");
    };
    document.getElementById("cancelAddBtn").onclick = () => {
      document.getElementById("addPanel").classList.remove("open");
      document.getElementById("add-product-form").reset();
    };

    /* Add product */
    document.getElementById("add-product-form").addEventListener("submit", async e => {
      e.preventDefault();
      const name     = document.getElementById("product-name").value.trim();
      const category = document.getElementById("product-category").value.trim();
      const price    = Number(document.getElementById("product-price").value);
      const file     = document.getElementById("product-image").files[0];

      if (!name || !category || !price || !file) { toast.show("All fields required", "error"); return; }

      try {
        loader.show();
        const bar  = document.getElementById("upload-progress-bar");
        const fill = document.getElementById("upload-progress-fill");
        bar.style.display = "block";

        const uploaded = await storageService.upload(file, "products", pct => {
          fill.style.width = pct + "%";
        });

        await addDoc(collection(db, "products"), {
          name, category, price, image: uploaded.url,
          imagePath: uploaded.path, createdAt: serverTimestamp()
        });

        toast.show("Product added");
        bar.style.display = "none"; fill.style.width = "0%";
        document.getElementById("add-product-form").reset();
        document.getElementById("addPanel").classList.remove("open");
        loadProducts();
      } catch(err) { toast.show(err.message, "error"); }
      finally { loader.hide(); }
    });

    async function loadProducts() {
      try {
        loader.show();
        const snap = await getDocs(collection(db, "products"));
        allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        document.getElementById("products-count").textContent = `${allProducts.length} products`;
        render(allProducts);
      } catch(e) { toast.show(e.message, "error"); }
      finally { loader.hide(); }
    }

    function render(list) {
      const container = document.getElementById("products-list");
      container.innerHTML = "";
      if (!list.length) {
        container.innerHTML = `<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:40px">No products found.</p>`;
        return;
      }
      list.forEach(p => {
        const card = document.createElement("div"); card.className = "product-card";

        const img = document.createElement("img"); img.className = "product-img";
        img.src = p.image || "/assets/images/product-placeholder.png"; img.alt = p.name || "";

        const body = document.createElement("div"); body.className = "product-body";

        const nm = document.createElement("div"); nm.className = "product-name"; nm.textContent = p.name;
        const ct = document.createElement("div"); ct.className = "product-cat";  ct.textContent = p.category;
        const pr = document.createElement("div"); pr.className = "product-price"; pr.textContent = `₹${p.price}/kg`;

        const actions = document.createElement("div"); actions.className = "product-actions";
        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.style.cssText = "background:rgba(239,68,68,.15);color:var(--danger);";
        delBtn.onmouseover = () => { delBtn.style.background = "var(--danger)"; delBtn.style.color = "#fff"; };
        delBtn.onmouseout  = () => { delBtn.style.background = "rgba(239,68,68,.15)"; delBtn.style.color = "var(--danger)"; };
        delBtn.onclick = async () => {
          if (!confirm("Delete this product?")) return;
          try {
            loader.show();
            await deleteDoc(doc(db, "products", p.id));
            if (p.imagePath) await storageService.delete(p.imagePath).catch(() => {});
            toast.show("Product deleted");
            loadProducts();
          } catch(e) { toast.show(e.message, "error"); }
          finally { loader.hide(); }
        };
        actions.appendChild(delBtn);

        body.appendChild(nm); body.appendChild(ct); body.appendChild(pr); body.appendChild(actions);
        card.appendChild(img); card.appendChild(body);
        container.appendChild(card);
      });
    }

    document.getElementById("product-search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      render(allProducts.filter(p =>
        p.name?.toLowerCase().includes(q) || p.category?.toLowerCase().includes(q)
      ));
    });

    loadProducts();
  </script>
</body>
</html>
