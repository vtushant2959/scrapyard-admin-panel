<div id="globalModal" class="modal" aria-hidden="true">
  <div class="modal-overlay"></div>

  <div class="modal-content" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 id="modalTitle">Modal Title</h3>
      <button id="closeModal" aria-label="Close modal">×</button>
    </div>

    <div class="modal-body" id="modalBody">
      <!-- Dynamic content here -->
    </div>

    <div class="modal-footer">
      <button id="cancelModal" class="btn-secondary">Cancel</button>
      <button id="confirmModal" class="btn-primary">Confirm</button>
    </div>
  </div>
</div>
